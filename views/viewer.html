<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bonna — Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body style="overflow:hidden">
<div class="viewer-header">
  <div>
    <div class="viewer-title" id="viewerTitle">Yukleniyor...</div>
  </div>
  <div class="viewer-actions">
    <button class="btn btn-outline btn-small" onclick="window.location.href='/'">&#8592; Kutuphane</button>
  </div>
</div>
<iframe id="viewerFrame" class="viewer-frame" sandbox="allow-scripts allow-same-origin"></iframe>
<script>
const artifactId = window.location.pathname.split('/').pop();

async function loadArtifact() {
  const res = await fetch(`/api/artifacts/${artifactId}`);
  if (!res.ok) { window.location.href = '/'; return; }
  const data = await res.json();
  document.getElementById('viewerTitle').textContent = data.title;
  document.title = `bonna — ${data.title}`;

  const frame = document.getElementById('viewerFrame');
  const blob = new Blob([data.html_content], { type: 'text/html' });
  frame.src = URL.createObjectURL(blob);
}

loadArtifact();
</script>
</body>
</html>
