<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bonna — Calisma Kutuphanesi</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-logo">
      <div class="brand">bonna</div>
      <div class="sub">Calisma Kutuphanesi</div>
    </div>
    <div class="sb-nav">
      <div class="sb-section-label">Menu</div>
      <button class="sb-item active" data-filter="all">
        <span class="icon">&#128218;</span>
        Tum Calisma<span class="cnt" id="countAll">0</span>
      </button>
      <button class="sb-item" data-filter="ERP">
        <span class="icon">&#9881;</span>
        ERP
      </button>
      <button class="sb-item" data-filter="SEO">
        <span class="icon">&#128269;</span>
        SEO
      </button>
      <button class="sb-item" data-filter="Analiz">
        <span class="icon">&#128202;</span>
        Analiz
      </button>
      <button class="sb-item" data-filter="Strateji">
        <span class="icon">&#127919;</span>
        Strateji
      </button>
      <button class="sb-item" data-filter="Genel">
        <span class="icon">&#128196;</span>
        Genel
      </button>
    </div>
    <div class="sb-footer">
      <button class="logout-btn" id="logoutBtn">
        &#8594; Cikis Yap
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="main-content">
    <div class="main-inner">
      <div class="page-header">
        <div>
          <div class="page-title" id="pageTitle">Tum Calismalar</div>
          <div class="page-desc" id="pageDesc">Bonna calisma kutuphanesindeki tum artifactler</div>
        </div>
        <button class="btn btn-sand" id="addBtn">+ Yeni Ekleme</button>
      </div>

      <div class="artifacts-grid" id="artifactsGrid"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="icon">&#128218;</div>
        <div class="title">Henuz calisma yok</div>
        <div class="desc">Yeni bir artifact ekleyerek baslayabilirsiniz</div>
        <button class="btn btn-sand" onclick="document.getElementById('addBtn').click()">+ Ilk Calismayi Ekle</button>
      </div>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Yeni Calisma Ekle</div>
      <button class="modal-close" onclick="closeModal('addModal')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="file-drop" id="fileDrop">
        <div class="icon">&#128193;</div>
        <div class="text"><strong>HTML dosyasi secin</strong> veya surukleyin</div>
        <input type="file" id="fileInput" accept=".html,.htm">
      </div>
      <div class="form-group">
        <label class="form-label">Baslik</label>
        <input type="text" class="form-input" id="addTitle" placeholder="Calisma basligi">
      </div>
      <div class="form-group">
        <label class="form-label">Aciklama</label>
        <textarea class="form-textarea" id="addDesc" placeholder="Kisa aciklama" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Kategori</label>
        <select class="form-input" id="addCategory">
          <option value="Genel">Genel</option>
          <option value="ERP">ERP</option>
          <option value="SEO">SEO</option>
          <option value="Analiz">Analiz</option>
          <option value="Strateji">Strateji</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">veya HTML Kodu Yapistirin</label>
        <textarea class="form-textarea" id="addHtml" placeholder="<!DOCTYPE html>..." rows="5"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addModal')">Iptal</button>
      <button class="btn btn-sand" id="saveBtn">Kaydet</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detailTitle"></div>
      <button class="modal-close" onclick="closeModal('detailModal')">&times;</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
